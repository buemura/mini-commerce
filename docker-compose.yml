networks:
  event_driven_commerce:

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

services:
  prometheus:
    image: prom/prometheus:v3.1.0
    hostname: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - event_driven_commerce

  grafana:
    image: grafana/grafana:11.5.1
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - event_driven_commerce

  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    hostname: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - event_driven_commerce

  rabbitmq:
    image: rabbitmq:3.8-management
    hostname: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - event_driven_commerce

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    command: postgres -c checkpoint_timeout=600 -c max_wal_size=4096
    volumes:
      # postgres 18+ expects a single mount at /var/lib/postgresql
      - postgres_data:/var/lib/postgresql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - event_driven_commerce

  product-service:
    build:
      context: .
      dockerfile: ./mc-product-service/Dockerfile
    hostname: product-service
    ports:
      - "50050:50050"
      - "9101:9100"
    environment:
      GRPC_PORT: 50050
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/product_service
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      METRICS_PORT: 9100
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - event_driven_commerce

  customer-service:
    build:
      context: .
      dockerfile: ./mc-customer-service/Dockerfile
    hostname: customer-service
    ports:
      - "50051:50051"
      - "9102:9100"
    environment:
      GRPC_PORT: 50051
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/customer_service
      JWT_SECRET: secret
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      METRICS_PORT: 9100
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - event_driven_commerce

  order-service:
    build:
      context: .
      dockerfile: ./mc-order-service/Dockerfile
    hostname: order-service
    ports:
      - "50052:50052"
      - "9103:9100"
    environment:
      GRPC_PORT: 50052
      GRPC_HOST_PRODUCT_SVC: product-service:50050
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/order_service
      BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      METRICS_PORT: 9100
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - event_driven_commerce

  payment-service:
    build:
      context: .
      dockerfile: ./mc-payment-service/Dockerfile
    hostname: payment-service
    ports:
      - "9104:9100"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payment_service
      BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      METRICS_PORT: 9100
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - event_driven_commerce

  api-gateway:
    build:
      context: .
      dockerfile: ./mc-api-gateway/Dockerfile
    hostname: api-gateway
    ports:
      - "8080:8080"
      - "9105:9100"
    environment:
      PORT: 8080
      GRPC_HOST_PRODUCT_SVC: product-service:50050
      GRPC_HOST_CUSTOMER_SVC: customer-service:50051
      GRPC_HOST_ORDER_SVC: order-service:50052
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      METRICS_PORT: 9100
    depends_on:
      product-service:
        condition: service_started
      customer-service:
        condition: service_started
      order-service:
        condition: service_started
    networks:
      - event_driven_commerce

  frontend:
    build:
      context: .
      dockerfile: ./mc-frontend/Dockerfile
    hostname: frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - event_driven_commerce
